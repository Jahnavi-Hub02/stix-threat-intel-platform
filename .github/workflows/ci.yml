name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

# ──────────────────────────────────────────────────────────────────
# Job 1: Full Python test suite on Python 3.11 and 3.12
# ──────────────────────────────────────────────────────────────────
jobs:
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required runtime directories
        run: mkdir -p database models data

      - name: Run full test suite with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --ignore=tests/test_placeholder.py
        env:
          PYTHONPATH: .
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-used-in-production
          ML_MIN_TRAIN_SAMPLES: "5"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11' && always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # Job 2: React frontend build
  # ──────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          # cache-dependency-path must point to the lockfile actually present
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Docker build (main branch only, after tests + frontend pass)
  # ──────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: stix-threat-intel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────
  # Job 4: Security scan (main branch only)
  # ──────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        # safety >= 3.0 uses 'safety scan' — 'safety check' is deprecated and
        # will fail on modern installs. requirements.txt pins safety>=3.0.
        run: pip install "safety>=3.0.0" bandit

      - name: Check dependencies for known CVEs
        # safety scan is the correct command for safety >= 3.0
        run: safety scan -r requirements.txt
        continue-on-error: true

      - name: Static security analysis (bandit)
        run: |
          bandit -r app/ \
            --skip B101,B608 \
            --format txt \
            --severity-level medium
        continue-on-error: true