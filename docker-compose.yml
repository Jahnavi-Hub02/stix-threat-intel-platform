version: "3.9"

# ── STIX Threat Intelligence Platform — Docker Compose ──────────────────────
# This project uses SQLite (not PostgreSQL). The only services needed are:
#   backend  → FastAPI on port 8000
#   frontend → React/Vite on port 5173
#
# Usage:
#   docker-compose up --build          # first run
#   docker-compose up                  # subsequent runs
#   docker-compose down                # stop

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stix_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./database:/app/database
      - ./models:/app/models
      - ./reports:/app/reports
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:18-alpine
    container_name: stix_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend