version: "3.9"

services:
  app:
    build: .
    container_name: stix_app
    env_file: .env
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      REPORTS_DIR: /app/reports
      ML_MODEL_DIR: /app/models
      ML_MIN_TRAIN_SAMPLES: 50
      ML_CONTAMINATION: "0.05"
    ports:
      - "8000:8000"
    volumes:
      - stix_database:/app/database   # SQLite DB persists between restarts
      - stix_models:/app/models       # ML model .pkl files persist
      - stix_reports:/app/reports     # PDF reports persist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  stix_database:
  stix_models:
  stix_reports:
