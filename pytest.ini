[pytest]
# ── Custom marks ───────────────────────────────────────────────────────────────
# Register every mark used in the test suite so pytest does not emit
# PytestUnknownMarkWarning for them.
markers =
    unit:        Fast, isolated unit tests (no DB, no network)
    api:         FastAPI endpoint tests using TestClient + temp SQLite DB
    integration: End-to-end pipeline tests spanning multiple modules

# ── Warning filters ────────────────────────────────────────────────────────────
filterwarnings =
    # sklearn: scaler fitted on DataFrame, transform called with numpy array.
    ignore::UserWarning:sklearn

    # requests + urllib3 version mismatch — harmless at runtime.
    ignore::Warning:requests

    # starlette formparsers.py uses old "import multipart" path.
    ignore::DeprecationWarning:starlette
    ignore::PendingDeprecationWarning:starlette

# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ─────────────────────────────────────────────────────────────────────
# -ra  → show summary for all non-passing tests
# --tb=short → compact tracebacks
addopts = -ra --tb=short