[pytest]
# ── Warning filters ────────────────────────────────────────────────────────────
# These suppress warnings that come from third-party libraries, not our code.
# Each entry is: action:message_regex:category:module_regex:lineno
#
# To see ALL warnings again (for debugging): pytest -W default
filterwarnings =
    # sklearn: scaler fitted on DataFrame, transform called with numpy array.
    # Fixed in classifier.py by fitting on X_tr.values, but third-party test
    # fixtures may still trigger this. Suppress at package level.
    ignore::UserWarning:sklearn

    # requests + urllib3 version mismatch warning.
    # urllib3 2.6.x is newer than requests 2.32.3 expects — harmless at runtime.
    # Fix by upgrading requests in the venv: pip install --upgrade requests
    ignore::Warning:requests

    # starlette formparsers.py uses old "import multipart" path.
    # Fixed by upgrading python-multipart: pip install python-multipart>=0.0.12
    ignore::DeprecationWarning:starlette
    ignore::PendingDeprecationWarning:starlette

# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ─────────────────────────────────────────────────────────────────────
# Show extra test summary for failures and errors only
addopts = -ra --tb=short